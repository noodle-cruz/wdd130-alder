<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DO ANYTHING</title>
    <style>
        
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Black+Ops+One&display=swap');

        body {
            margin: 0;
            overflow: hidden;
            background: #121212;
            height: 100vh;
            width: 100vw;
            touch-action: none; /* Prevents scrolling while dragging on mobile */
        }

        .letter {
            position: absolute;
            width: 80px;
            height: 80px;
            background: #f0ede6;
            color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            font-weight: 900;
            font-family: 'Black Ops One';
            border-radius: 12px;
            user-select: none;
            cursor: grab;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
          
            transform-origin: center center;
            will-change: transform;
        }
        .letter:active { cursor: grabbing; }
    </style>
    <link rel="stylesheet" href="styles/styles.css">

</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="how-to-play.html">How to Play</a></li>
            <li><a href="gallery.html">Gallery</a></li>
        </ul>
    </nav>

    <div class="letter">D</div>
    <div class="letter">O</div>
    <div class="letter">A</div>
    <div class="letter">N</div>
    <div class="letter">Y</div>
    <div class="letter">T</div>
    <div class="letter">H</div>
    <div class="letter">I</div>
    <div class="letter">N</div>
    <div class="letter">G</div>

        <footer>
            <p>GRAB · DRAG · SCULPT · CREATE</p>
        </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script>
        const { Engine, Runner, Bodies, Composite, MouseConstraint, Mouse } = Matter;

        const engine = Engine.create();
        const world = engine.world;
        const runner = Runner.create();

        // 1. Create thick boundaries (100px thick) so letters can't escape
        const thickness = 100;
        const floor = Bodies.rectangle(0, 0, 0, thickness, { isStatic: true });
        const leftWall = Bodies.rectangle(0, 0, thickness, 0, { isStatic: true });
        const rightWall = Bodies.rectangle(0, 0, thickness, 0, { isStatic: true });
        const ceiling = Bodies.rectangle(0, 0, 0, thickness, { isStatic: true });

        Composite.add(world, [floor, leftWall, rightWall, ceiling]);


        // 2. Function to update boundaries based on current window size
        function updateBoundaries() {
            const w = window.innerWidth;
            const h = window.innerHeight;

            // Position floor at the bottom
            Matter.Body.setPosition(floor, { x: (w / 2), y: h + (thickness / 2) });
            Matter.Body.setVertices(floor, Bodies.rectangle(w / 2, h + (thickness / 2), w * 2, thickness).vertices);


            // Position walls
            Matter.Body.setPosition(leftWall, { x: -thickness / 2, y: h / 2 });
            Matter.Body.setVertices(leftWall, Bodies.rectangle(-thickness / 2, h / 2, thickness, h * 2).vertices);

            Matter.Body.setPosition(rightWall, { x: w + (thickness / 2), y: h / 2 });
            Matter.Body.setVertices(rightWall, Bodies.rectangle(w + (thickness / 2), h / 2, thickness, h * 2).vertices);
            
            // Position ceiling
            Matter.Body.setPosition(ceiling, { x: w / 2, y: -thickness / 2 });
            Matter.Body.setVertices(ceiling, Bodies.rectangle(w / 2, -thickness / 2, w * 2, thickness).vertices);
        }

        updateBoundaries();
        window.addEventListener('resize', updateBoundaries);

        // 3. Initialize Letter Bodies
        const letterElements = document.querySelectorAll('.letter');
        const letterBodies = Array.from(letterElements).map((el, i) => {
            const width = 80;
            const height = 80;
            // Spread them out across the top
            const x = 100 + (i * 100);
            const y = 50;
            
            const body = Bodies.rectangle(x, y, width, height, {
                restitution: 0.5,
                friction: 0.1,
                frictionAir: 0.01
            });
            
            body.element = el;
            return body;
        });

        Composite.add(world, letterBodies);

        // 4. Mouse interaction
        const mouse = Mouse.create(document.body);
        const mouseConstraint = MouseConstraint.create(engine, {
            mouse: mouse,
            constraint: { stiffness: 0.1, render: { visible: false } }
        });
        Composite.add(world, mouseConstraint);

        // 5. Update Loop
        (function rerender() {
            letterBodies.forEach(body => {
                const { x, y } = body.position;
                // Move the HTML element to match the physics body
                // Subtract 40px (half of width/height) to center the element on the body
                body.element.style.transform = `translate(${x - 40}px, ${y - 40}px) rotate(${body.angle}rad)`;
            });

            Engine.update(engine);
            requestAnimationFrame(rerender);
        })();

        Runner.run(runner, engine);
    </script>
</body>
</html>
